<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Settings — Saikou Radio</title>
  <link id="theme-link" rel="stylesheet" href="../themes/y2k-silver.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px 16px 16px;
      font-family: var(--font-ui, 'Tahoma', 'Arial', sans-serif);
      font-size: 11px;
      background: var(--bg-primary, #d4d0c8);
      color: var(--text-primary, #000);
      user-select: none;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: bold;
      color: var(--text-primary, #000);
    }

    .section {
      border: 1px solid var(--border-dark, #808080);
      border-radius: 2px;
      margin-bottom: 10px;
      padding: 8px 10px 6px;
      background: var(--bg-panel, #ece9d8);
    }

    .section-title {
      font-weight: bold;
      font-size: 11px;
      margin-bottom: 6px;
      color: var(--text-accent, #003399);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .row {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
      gap: 6px;
    }

    .row label {
      width: 130px;
      flex-shrink: 0;
      font-size: 11px;
    }

    .row input[type="text"],
    .row input[type="number"],
    .row select,
    .row textarea {
      flex: 1;
      font-family: inherit;
      font-size: 11px;
      padding: 2px 4px;
      border: 1px solid var(--border-dark, #7f9db9);
      background: var(--bg-secondary, #fff);
      color: var(--text-primary, #000);
      border-radius: 1px;
    }

    .row input[type="number"] {
      width: 60px;
      flex: none;
    }

    .row textarea {
      height: 70px;
      resize: vertical;
      flex: 1;
    }

    .row input[type="checkbox"] {
      width: 13px;
      height: 13px;
      margin: 0;
      cursor: pointer;
    }

    .browse-btn {
      font-family: inherit;
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      background: var(--btn-bg, #ece9d8);
      color: var(--btn-text, #000);
      border: 1px solid var(--border-dark, #808080);
      border-radius: 2px;
      white-space: nowrap;
    }
    .browse-btn:hover { filter: brightness(1.1); }

    #custom-css-row { display: none; }

    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    .footer button {
      font-family: inherit;
      font-size: 11px;
      padding: 3px 18px;
      cursor: pointer;
      background: var(--btn-bg, #ece9d8);
      color: var(--btn-text, #000);
      border: 1px solid var(--border-dark, #808080);
      border-radius: 2px;
      min-width: 72px;
    }
    .footer button:hover { filter: brightness(1.1); }
    .footer button#save-btn { font-weight: bold; }
  </style>
</head>
<body>
  <h2>Saikou Radio — Settings</h2>

  <!-- Playback -->
  <div class="section">
    <div class="section-title">Playback</div>

    <div class="row">
      <label for="break-interval">Break Interval (min)</label>
      <input type="number" id="break-interval" min="1" max="60" value="15" />
    </div>

    <div class="row">
      <label for="fade-seconds">Fade In / Out</label>
      <input type="range" id="fade-seconds" min="0" max="8" step="0.5" value="2" style="flex:1" />
      <span id="fade-seconds-val" style="width:40px;text-align:right">2s</span>
    </div>

    <div class="row">
      <label for="loop">Loop Playlist</label>
      <input type="checkbox" id="loop" />
    </div>

    <div class="row">
      <label for="shuffle">Shuffle</label>
      <input type="checkbox" id="shuffle" />
    </div>
  </div>

  <!-- DJ / TTS -->
  <div class="section">
    <div class="section-title">DJ / TTS</div>

    <div class="row">
      <label for="tts-engine">TTS Engine</label>
      <select id="tts-engine">
        <option value="edge">Edge (Microsoft Neural)</option>
        <option value="sapi">SAPI (Windows)</option>
      </select>
    </div>

    <div class="row">
      <label for="tts-voice">TTS Voice</label>
      <select id="tts-voice"></select>
    </div>

    <div class="row" style="align-items: flex-start;">
      <label for="personality-phrases" style="padding-top:2px;">Extra Phrases</label>
      <textarea id="personality-phrases" placeholder="Optional — your own lines, one per line. Added on top of the DJ's built-in rotation."></textarea>
    </div>
  </div>

  <!-- Jingles -->
  <div class="section">
    <div class="section-title">Jingles</div>

    <div class="row">
      <label for="jingles-enabled">Enable Jingles</label>
      <input type="checkbox" id="jingles-enabled" />
    </div>

    <div class="row">
      <label for="jingles-folder">Jingles Folder</label>
      <input type="text" id="jingles-folder" placeholder="Path to jingles folder…" readonly />
      <button class="browse-btn" id="browse-jingles">Browse…</button>
    </div>
  </div>

  <!-- Appearance -->
  <div class="section">
    <div class="section-title">Appearance</div>

    <div class="row">
      <label for="theme">Theme</label>
      <select id="theme">
        <option value="y2k-silver">Y2K Silver</option>
        <option value="dark-lcd">Dark LCD</option>
        <option value="blueberry-xp">Blueberry XP</option>
        <option value="win98">Windows 98</option>
        <option value="white-on-black">White on Black</option>
        <option value="green-terminal">Green Terminal</option>
        <option value="c64-amber">C64 Amber</option>
        <option value="vaporwave">Vaporwave</option>
        <option value="warm-sepia">Warm Sepia</option>
        <option value="catppuccin-mocha">Catppuccin Mocha</option>
        <option value="ipod-classic">iPod Classic</option>
        <option value="marlboro">Marlboro</option>
        <option value="sakura">Sakura</option>
        <option value="game-boy">Game Boy</option>
        <option value="nord">Nord</option>
        <option value="gruvbox-dark">Gruvbox Dark</option>
        <option value="catppuccin-latte">Catppuccin Latte</option>
        <option value="aqua">Aqua</option>
        <option value="tokyo-night">Tokyo Night</option>
        <option value="custom">Custom…</option>
      </select>
    </div>

    <div class="row" id="custom-css-row">
      <label for="custom-theme-path">Custom CSS File</label>
      <input type="text" id="custom-theme-path" placeholder="Path to .css file…" readonly />
      <button class="browse-btn" id="browse-custom-css">Browse…</button>
    </div>

    <div class="row">
      <label for="always-on-top">Always on Top</label>
      <input type="checkbox" id="always-on-top" />
    </div>
  </div>

  <!-- Remote -->
  <div class="section">
    <div class="section-title">Remote (LAN)</div>
    <div class="row">
      <label for="remote-enabled">Enable Remote</label>
      <input type="checkbox" id="remote-enabled" />
    </div>
    <div class="row">
      <label for="remote-port">Port</label>
      <input type="number" id="remote-port" min="1024" max="65535" value="7000" />
    </div>
    <div class="row">
      <label>&nbsp;</label>
      <span style="flex:1;font-size:10px;color:var(--text-secondary,#666)">Anyone on your Wi&#8209;Fi can control playback. Connect from the Remote button in the player.</span>
    </div>
  </div>

  <!-- Pomodoro -->
  <div class="section">
    <div class="section-title">Pomodoro</div>
    <div class="row">
      <label for="pomo-work">Work (min)</label>
      <input type="number" id="pomo-work" min="1" max="180" value="25" />
    </div>
    <div class="row">
      <label for="pomo-short">Short Break (min)</label>
      <input type="number" id="pomo-short" min="1" max="60" value="5" />
    </div>
    <div class="row">
      <label for="pomo-long">Long Break (min)</label>
      <input type="number" id="pomo-long" min="1" max="120" value="15" />
    </div>
    <div class="row">
      <label for="pomo-every">Long Break Every</label>
      <input type="number" id="pomo-every" min="1" max="12" value="4" />
    </div>
    <div class="row" style="align-items:flex-start;">
      <label for="pomo-focus-en" style="padding-top:2px;">Focus Phrases (EN)</label>
      <textarea id="pomo-focus-en" placeholder="One phrase per line…"></textarea>
    </div>
    <div class="row" style="align-items:flex-start;">
      <label for="pomo-focus-es" style="padding-top:2px;">Focus Phrases (ES)</label>
      <textarea id="pomo-focus-es" placeholder="Una frase por línea…"></textarea>
    </div>
    <div class="row" style="align-items:flex-start;">
      <label for="pomo-break-en" style="padding-top:2px;">Break Phrases (EN)</label>
      <textarea id="pomo-break-en" placeholder="One phrase per line…"></textarea>
    </div>
    <div class="row" style="align-items:flex-start;">
      <label for="pomo-break-es" style="padding-top:2px;">Break Phrases (ES)</label>
      <textarea id="pomo-break-es" placeholder="Una frase por línea…"></textarea>
    </div>
  </div>

  <!-- Library -->
  <div class="section">
    <div class="section-title">Library</div>
    <div class="row">
      <label for="playlist-folder">Playlists Folder</label>
      <input type="text" id="playlist-folder" placeholder="Folder of .m3u playlists…" readonly />
      <button class="browse-btn" id="browse-playlist-folder">Browse…</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button id="cancel-btn">Cancel</button>
    <button id="save-btn">Save</button>
  </div>

  <script src="settings-ui.js"></script>
</body>
</html>
