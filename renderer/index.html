<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saikou Radio</title>
  <link id="base-98" rel="stylesheet" href="" disabled>
  <link id="theme-link" rel="stylesheet" href="../themes/y2k-silver.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-ui, Tahoma, sans-serif);
      background: var(--bg-primary, #c0c0c8);
      color: var(--text-primary, #111);
      user-select: none;
      height: 100vh;
      overflow: hidden;
    }
    #titlebar {
      background: var(--bg-secondary, #e4e4e8);
      border-bottom: 2px solid var(--border-dark, #888);
      padding: 5px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      -webkit-app-region: drag;
    }
    #titlebar button, #titlebar .clock {
      -webkit-app-region: no-drag;
    }
    #titlebar .logo {
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 2px;
    }
    #titlebar .clock { font-size: 11px; color: var(--text-secondary, #444); }
    #main {
      display: grid;
      grid-template-columns: 1fr 200px;
      grid-template-rows: 1fr auto;
      height: calc(100vh - 32px);
    }
    #player-panel {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-right: 2px solid var(--border-dark, #888);
    }
    #lcd {
      background: var(--bg-lcd, #1a1a2e);
      color: var(--text-accent, #00e5ff);
      font-family: var(--font-mono, monospace);
      padding: 10px;
      border: 2px inset var(--border-dark, #666);
      font-size: 13px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    #album-art {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border: 1px solid var(--border-dark, #333);
      flex-shrink: 0;
      display: none;
    }
    #album-art.visible { display: block; }
    #lcd-text { flex: 1; min-width: 0; }
    #lcd .track-title { font-size: 13px; white-space: normal; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3; }
    #lcd .track-meta { font-size: 10px; color: var(--text-secondary, #88ccdd); margin-top: 3px; }
    #seek-slider {
      width: 100%;
      margin-top: 8px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, var(--text-accent, #00e5ff) 0%, var(--text-accent, #00e5ff) var(--seek-pct, 0%), #003344 var(--seek-pct, 0%), #003344 100%);
      outline: none;
      cursor: pointer;
      border: none;
      padding: 0;
      border-radius: 2px;
    }
    #seek-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-accent, #00e5ff);
      cursor: pointer;
      border: 2px solid var(--bg-lcd, #1a1a2e);
      box-shadow: 0 0 4px var(--text-accent, #00e5ff);
      transition: transform 0.1s;
    }
    #seek-slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }
    #seek-slider::-webkit-slider-runnable-track {
      background: transparent;
    }
    #controls { display: flex; gap: 6px; }
    .ctrl-btn {
      flex: 1;
      background: var(--btn-bg, #d0d0d8);
      color: var(--btn-text, #111) !important;
      border: 2px solid var(--border-light, #fff);
      border-right-color: var(--border-dark, #888);
      border-bottom-color: var(--border-dark, #888);
      padding: 5px;
      cursor: pointer;
      font-size: 14px;
      font-family: var(--font-ui);
    }
    .ctrl-btn.active {
      background: var(--text-accent, #00e5ff);
      color: var(--bg-lcd, #1a1a2e) !important;
    }
    #secondary-controls { display: flex; gap: 6px; }
    .ctrl-btn:active {
      border-color: var(--border-dark, #888);
      border-right-color: var(--border-light, #fff);
      border-bottom-color: var(--border-light, #fff);
    }
    #open-btn {
      background: var(--btn-bg, #d0d0d8);
      color: var(--btn-text, #111);
      border: 2px solid var(--border-light, #fff);
      border-right-color: var(--border-dark, #888);
      border-bottom-color: var(--border-dark, #888);
      padding: 4px 10px;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 11px;
      flex: 2;
    }
    #playlist-panel {
      background: var(--bg-panel, #dcdce4);
      border-left: 1px solid var(--border-dark, #888);
      overflow-y: auto;
      padding: 6px;
      font-size: 11px;
    }
    #playlist-panel .pl-header {
      font-weight: bold;
      font-size: 10px;
      color: var(--text-secondary, #444);
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .pl-track {
      padding: 3px 5px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-radius: 2px;
    }
    .pl-track:hover { background: var(--bg-secondary, #e4e4e8); }
    .pl-track.active { color: var(--text-accent, #00e5ff); font-weight: bold; }
    .pl-track.error { color: #cc4444; }
    #dj-panel {
      grid-column: 1 / -1;
      background: var(--bg-secondary, #e4e4e8);
      border-top: 2px solid var(--border-dark, #888);
      padding: 5px 12px;
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 11px;
    }
    #dj-panel .dj-item { display: flex; gap: 5px; }
    #dj-panel .dj-label { color: var(--text-secondary, #555); }
    #dj-panel .dj-value { font-weight: bold; }
    #settings-btn {
      margin-left: auto;
      background: var(--btn-bg, #d0d0d8);
      color: var(--btn-text, #111);
      border: 2px solid var(--border-light, #fff);
      border-right-color: var(--border-dark, #888);
      border-bottom-color: var(--border-dark, #888);
      padding: 3px 8px;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 10px;
    }
    #mini-btn, #fullscreen-btn, #remote-btn, #timers-btn, #library-btn {
      background: var(--btn-bg, #d0d0d8);
      color: var(--btn-text, #111);
      border: 2px solid var(--border-light, #fff);
      border-right-color: var(--border-dark, #888);
      border-bottom-color: var(--border-dark, #888);
      padding: 3px 8px;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 10px;
    }

    /* ── Mini mode ── */
    body.mini #main { display: none; }
    body.mini #titlebar { display: none; }
    body.mini #mini-bar { display: flex; }

    #mini-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      height: 100px;
      background: var(--bg-secondary, #e4e4e8);
      border-bottom: 2px solid var(--border-dark, #888);
      overflow: hidden;
      -webkit-app-region: drag;
    }
    #mini-bar * { -webkit-app-region: no-drag; }

    #mini-art {
      width: 76px;
      height: 76px;
      flex-shrink: 0;
      background: var(--bg-lcd, #1a1a2e);
      border: 2px inset var(--border-dark, #666);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--text-accent, #00e5ff);
      overflow: hidden;
    }
    #mini-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #mini-art img.visible { display: block; }

    #mini-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
      justify-content: center;
    }
    #mini-marquee-wrap {
      background: var(--bg-lcd, #1a1a2e);
      border: 2px inset var(--border-dark, #666);
      overflow: hidden;
      height: 34px;
      display: flex;
      align-items: center;
    }
    #mini-marquee {
      display: inline-block;
      white-space: nowrap;
      font-family: var(--font-mono, monospace);
      font-size: 12px;
      color: var(--text-accent, #00e5ff);
      animation: marquee-scroll 14s linear infinite;
      will-change: transform;
    }
    @keyframes marquee-scroll {
      0%   { transform: translateX(480px); }
      100% { transform: translateX(-100%); }
    }
    #mini-marquee.short {
      animation: none;
      transform: none;
      padding-left: 10px;
    }

    #mini-controls {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .mini-btn {
      flex: 1;
      background: var(--btn-bg, #d0d0d8);
      color: var(--btn-text, #111);
      border: 2px solid var(--border-light, #fff);
      border-right-color: var(--border-dark, #888);
      border-bottom-color: var(--border-dark, #888);
      padding: 0;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 13px;
    }
    .mini-btn:active {
      border-color: var(--border-dark, #888);
      border-right-color: var(--border-light, #fff);
      border-bottom-color: var(--border-light, #fff);
    }

    #mini-expand {
      flex-shrink: 0;
      background: var(--btn-bg, #d0d0d8);
      color: var(--btn-text, #111);
      border: 2px solid var(--border-light, #fff);
      border-right-color: var(--border-dark, #888);
      border-bottom-color: var(--border-dark, #888);
      cursor: pointer;
      height: 76px;
      width: 20px;
      padding: 0;
    }
    #mini-expand:active {
      border-color: var(--border-dark, #888);
      border-right-color: var(--border-light, #fff);
      border-bottom-color: var(--border-light, #fff);
    }

    #remote-overlay {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.6); align-items: center; justify-content: center;
    }
    #remote-overlay.show { display: flex; }
    #remote-card {
      background: var(--bg-secondary, #e4e4e8); color: var(--text-primary, #111);
      border: 2px solid var(--border-dark, #888); border-radius: 6px; padding: 18px 22px;
      text-align: center; font-family: var(--font-ui); max-width: 300px;
    }
    #remote-card h3 { font-size: 14px; margin-bottom: 10px; }
    #remote-card img { width: 200px; height: 200px; background: #fff; image-rendering: pixelated; }
    #remote-url { font-family: var(--font-mono, monospace); font-size: 13px; margin: 10px 0; word-break: break-all; }
    #remote-msg { font-size: 11px; color: var(--text-secondary, #555); }
    #remote-close { margin-top: 12px; padding: 4px 16px; cursor: pointer; font-family: var(--font-ui); }

    /* ── Master volume row ── */
    #volume-row { display: flex; align-items: center; gap: 8px; }
    #volume-row .vol-icon { font-size: 11px; color: var(--text-secondary, #555); letter-spacing: 1px; }
    #volume-slider, #fs-volume {
      flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
      background: var(--text-accent, #00e5ff); border-radius: 2px; cursor: pointer; outline: none;
    }
    #volume-slider::-webkit-slider-thumb, #fs-volume::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%;
      background: var(--text-accent, #00e5ff); border: 2px solid var(--bg-lcd, #1a1a2e); cursor: pointer;
    }

    /* ── Fullscreen mode ── */
    body.fullscreen #titlebar, body.fullscreen #main, body.fullscreen #mini-bar { display: none !important; }
    body.fullscreen #fullscreen { display: flex; }
    #fullscreen {
      display: none; position: fixed; inset: 0; flex-direction: column;
      background: var(--bg-lcd, #0d0d1a); overflow: hidden;
    }
    #fs-ambient {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
      filter: blur(40px) brightness(0.35); opacity: 0; transition: opacity 0.8s; z-index: 0;
    }
    #fs-ambient.visible { opacity: 1; }
    #viz-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
    #fs-countdown {
      position: absolute; top: 28px; right: 40px; z-index: 3;
      font-family: var(--font-mono, monospace); font-size: 14px; color: var(--text-secondary, #88ccdd);
    }
    #fs-overlay {
      position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column;
      pointer-events: none; padding: 30px 40px;
    }
    #fs-title { font-size: 38px; font-weight: bold; color: var(--text-accent, #00e5ff); text-shadow: 0 2px 24px rgba(0,0,0,.7); }
    #fs-artist { font-size: 20px; color: var(--text-secondary, #88ccdd); margin-top: 6px; }
    #fs-subtitle {
      margin-top: auto; align-self: center; max-width: 80%; text-align: center;
      font-size: 30px; line-height: 1.4; color: #fff; text-shadow: 0 2px 24px rgba(0,0,0,.85);
      opacity: 0; transition: opacity 0.4s;
    }
    #fs-subtitle.visible { opacity: 1; }
    #fs-controls {
      position: relative; z-index: 3; display: flex; align-items: center; justify-content: center; gap: 14px;
      padding: 16px; background: linear-gradient(transparent, rgba(0,0,0,.5)); transition: opacity 0.4s;
    }
    body.chrome-hidden #fs-controls { opacity: 0; pointer-events: none; }
    body.chrome-hidden { cursor: none; }
    #fs-controls button {
      background: var(--btn-bg, #d0d0d8); color: var(--btn-text, #111);
      border: 2px solid var(--border-light, #fff); border-right-color: var(--border-dark, #888);
      border-bottom-color: var(--border-dark, #888); padding: 8px 14px; cursor: pointer;
      font-size: 15px; font-family: var(--font-ui);
    }
    #fs-volume { max-width: 140px; flex: none; width: 140px; }

    #timers-overlay { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.6); align-items: center; justify-content: center; }
    #timers-overlay.show { display: flex; }
    #timers-card { background: var(--bg-secondary, #e4e4e8); color: var(--text-primary, #111); border: 2px solid var(--border-dark, #888); border-radius: 6px; padding: 16px 20px; min-width: 280px; font-family: var(--font-ui); }
    #timers-card h3 { font-size: 13px; margin: 0 0 8px; }
    #timers-card .grp { margin-bottom: 14px; }
    #timers-card .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary, #555); margin-bottom: 6px; }
    #timers-card .btns { display: flex; gap: 6px; flex-wrap: wrap; }
    #timers-card button { font-family: var(--font-ui); font-size: 11px; padding: 4px 10px; cursor: pointer; background: var(--btn-bg, #d0d0d8); color: var(--btn-text, #111); border: 2px solid var(--border-light, #fff); border-right-color: var(--border-dark, #888); border-bottom-color: var(--border-dark, #888); }
    #timers-card .display { font-family: var(--font-mono, monospace); color: var(--text-accent, #007); font-size: 13px; margin-top: 6px; }
    #timers-close { margin-top: 6px; }
    .pl-group { font-weight: bold; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-accent, #007); margin: 6px 0 2px; padding: 2px 4px; border-bottom: 1px solid var(--border-dark, #888); }
    #library-overlay { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.6); align-items: center; justify-content: center; }
    #library-overlay.show { display: flex; }
    #library-card { background: var(--bg-secondary, #e4e4e8); color: var(--text-primary, #111); border: 2px solid var(--border-dark, #888); border-radius: 6px; padding: 16px 18px; min-width: 280px; max-width: 360px; max-height: 70vh; overflow-y: auto; font-family: var(--font-ui); }
    #library-card h3 { font-size: 13px; margin: 0 0 10px; }
    #library-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    #library-list .lib-item { text-align: left; padding: 7px 10px; cursor: pointer; background: var(--btn-bg, #d0d0d8); color: var(--btn-text, #111); border: 1px solid var(--border-dark, #888); border-radius: 3px; font-family: var(--font-ui); font-size: 12px; }
    #library-list .lib-item:hover { filter: brightness(1.08); }
    #library-list .lib-empty { font-size: 11px; color: var(--text-secondary, #555); }
    #library-close { padding: 4px 16px; cursor: pointer; font-family: var(--font-ui); }
  </style>
</head>
<body>
  <!-- Mini player bar (visible only in mini mode) -->
  <div id="mini-bar">
    <div id="mini-art">
      <img id="mini-art-img" alt="">
      <span id="mini-art-placeholder">♪</span>
    </div>
    <div id="mini-info">
      <div id="mini-marquee-wrap">
        <span id="mini-marquee">No track loaded</span>
      </div>
      <div id="mini-controls">
        <button class="mini-btn" id="mini-prev">|&lt;</button>
        <button class="mini-btn" id="mini-play">&gt;</button>
        <button class="mini-btn" id="mini-next">&gt;|</button>
      </div>
    </div>
    <button id="mini-expand" title="Back to full view"></button>
  </div>

  <div id="titlebar">
    <span class="logo">SAIKOU RADIO</span>
    <span class="clock" id="clock">--:-- --</span>
  </div>
  <div id="main">
    <div id="player-panel">
      <div id="lcd">
        <img id="album-art" alt="">
        <div id="lcd-text">
          <div class="track-title" id="track-title">No playlist loaded</div>
          <div class="track-meta" id="track-meta">Open a .m3u file to begin</div>
          <input type="range" id="seek-slider" min="0" max="1000" value="0" step="1">
        </div>
      </div>
      <div id="controls">
        <button class="ctrl-btn" id="btn-prev">|&lt;</button>
        <button class="ctrl-btn" id="btn-play">&gt;</button>
        <button class="ctrl-btn" id="btn-next">&gt;|</button>
      </div>
      <div id="secondary-controls">
        <button class="ctrl-btn" id="btn-mono" title="Mono/Stereo">Stereo</button>
        <button class="ctrl-btn" id="btn-shuffle" title="Shuffle">RND</button>
        <button id="open-btn" style="flex:2">Open Playlist (.m3u)</button>
        <button class="ctrl-btn" id="clear-btn" title="Clear all playlists">✕</button>
      </div>
      <div id="volume-row">
        <span class="vol-icon">VOL</span>
        <input type="range" id="volume-slider" min="0" max="100" value="100">
      </div>
    </div>
    <div id="playlist-panel">
      <div class="pl-header">Playlist</div>
      <div id="playlist-list"></div>
    </div>
    <div id="dj-panel">
      <div class="dj-item">
        <span class="dj-label">DJ BREAK IN:</span>
        <span class="dj-value" id="dj-countdown">--:--</span>
      </div>
      <div class="dj-item">
        <span class="dj-label">TTS:</span>
        <span class="dj-value" id="dj-engine">--</span>
      </div>
      <div class="dj-item">
        <span class="dj-label">JINGLES:</span>
        <span class="dj-value" id="dj-jingles">--</span>
      </div>
      <div class="dj-item">
        <span class="dj-label" id="dj-status"></span>
      </div>
      <button id="settings-btn">Settings</button>
      <button id="library-btn" title="Library">📚</button>
      <button id="timers-btn" title="Timers">⏱</button>
      <button id="remote-btn" title="Phone remote">📱</button>
      <button id="fullscreen-btn" title="Fullscreen (F)">&#9974;</button>
      <button id="mini-btn" title="Mini player">_</button>
    </div>
  </div>
  <div id="fullscreen">
    <img id="fs-ambient" alt="">
    <canvas id="viz-canvas"></canvas>
    <div id="fs-countdown">--:--</div>
    <div id="fs-overlay">
      <div id="fs-top">
        <div id="fs-title">No track</div>
        <div id="fs-artist"></div>
      </div>
      <div id="fs-subtitle"></div>
    </div>
    <div id="fs-controls">
      <button id="fs-prev">|&lt;</button>
      <button id="fs-play">&gt;</button>
      <button id="fs-next">&gt;|</button>
      <input type="range" id="fs-volume" min="0" max="100" value="100">
      <button id="fs-cycle" title="Cycle visualizer (V)">VIZ</button>
      <button id="fs-exit" title="Exit (Esc)">&#9974;</button>
    </div>
  </div>
  <div id="remote-overlay">
    <div id="remote-card">
      <h3>📱 Phone Remote</h3>
      <img id="remote-qr" alt="" style="display:none">
      <div id="remote-url"></div>
      <div id="remote-msg"></div>
      <button id="remote-close">Close</button>
    </div>
  </div>
  <div id="timers-overlay">
    <div id="timers-card">
      <h3>⏱ Timers</h3>
      <div class="grp">
        <div class="lbl">Sleep</div>
        <div class="btns">
          <button data-sleep="0">Off</button>
          <button data-sleep="15">15m</button>
          <button data-sleep="30">30m</button>
          <button data-sleep="60">60m</button>
          <button data-sleep="90">90m</button>
        </div>
        <div class="display" id="sleep-display">Sleep off</div>
      </div>
      <div class="grp">
        <div class="lbl">Pomodoro</div>
        <div class="btns">
          <button id="pomo-start">Start</button>
          <button id="pomo-pause">Pause</button>
          <button id="pomo-skip">Skip</button>
          <button id="pomo-reset">Reset</button>
        </div>
        <div class="display" id="pomo-display">Idle</div>
      </div>
      <button id="timers-close">Close</button>
    </div>
  </div>
  <div id="library-overlay">
    <div id="library-card">
      <h3>📚 Library</h3>
      <div id="library-list"></div>
      <button id="library-close">Close</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
